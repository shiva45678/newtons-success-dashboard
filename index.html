<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Newtons AI | Success Dashboard</title>
</head>
<body>
<h1>Newtons AI Success Dashboard</h1>
<pre id="out">Loading…</pre>
<script>
const DATA_URL = './data.json';
let data = null;
fetch(DATA_URL).then(r=>r.json()).then(json=>{data=json;render();}).catch(e=>{document.getElementById('out').textContent='Failed to load data: '+e;});
function fmt(){try{return new Date().toLocaleString();}catch(e){return '';}}
function esc(s){return String(s??'').replace(/[<>&"']/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;','\'':'&#39;'}[m]));}
const STATUS_LABEL = {todo:'Todo', in_progress:'In Progress', done:'Done', completed:'Completed'};
function render(){
  const days = Object.values(data || {}).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''));
  const all = days.flatMap(d => (d.suggestions || d.items || []).map(it => ({...it, date: it.date || d.date})));
  const total = all.length;
  const done = all.filter(i => (i.status||'').toLowerCase()==='done' || (i.status||'').toLowerCase()==='completed').length;
  const progress = all.filter(i => (i.status||'').toLowerCase()==='in_progress').length;
  const todo = all.filter(i => (i.status||'').toLowerCase()==='todo').length;
  const rate = total ? Math.round((done/total)*100) : 0;
  let html = `Updated: ${esc(fmt())}\n`;
  html += `Total: ${total} | Done: ${done} | In Progress: ${progress} | Todo: ${todo} | Completion: ${rate}%\n\n`;
  const items = all.slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  if (!items.length) html += 'No items.\n';
  for (const it of items){
    const label = STATUS_LABEL[(it.status||'todo').toLowerCase()] || 'Todo';
    html += `- [${label}] ${esc(it.id||'')} ${esc(it.area||'')} ${esc(it.date||'')}\n  ${esc(it.text||it.title||it.task||'')}\n`;
    if (it.result) html += `  Result: ${esc(it.result)}\n`;
    html += `  Owner: ${esc(it.owner||'—')} | Due: ${esc(it.due||'—')}\n\n`;
  }
  document.getElementById('out').textContent = html;
}
</script>
</body>
</html>
